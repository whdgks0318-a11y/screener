name: Daily KR Update

# 매일 한국시간 15:40 (UTC 06:40) 자동 실행 - 한국장 마감 후
# 수동 실행도 가능 (workflow_dispatch)
on:
  schedule:
    - cron: '40 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: 📂 리포 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pykrx finance-datareader yfinance requests

      - name: 🇰🇷 KR Screener 실행 (KOSPI + KOSDAQ)
        run: python kr_screener.py

      - name: ☁️ GitHub 업로드 (kr_screener_output.json)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: trend-pilot
          GITHUB_REPO: screener
        run: python github_upload.py
