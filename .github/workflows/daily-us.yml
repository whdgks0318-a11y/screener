name: Daily US Update

# 매일 한국시간 06:30 (UTC 21:30 전날) 자동 실행
# 수동 실행도 가능 (workflow_dispatch)
on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: 📂 리포 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          

      - name: 📦 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests python-dotenv

      - name: 🔍 Screener 실행 (US 1900+ 종목)
        run: python screener.py

      - name: 🏷️ 섹터 정보 보강 (GICS 매칭)
        run: python enrich_sectors.py

      - name: ☁️ GitHub 업로드 (dashboard.html + screener_data.json)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: trend-pilot
          GITHUB_REPO: screener
        run: python github_upload.py

      - name: 💾 섹터 캐시 commit (다음 실행 빠르게)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f sector_cache.json ]; then
            git add sector_cache.json
            if git diff --staged --quiet; then
              echo "캐시 변경 없음"
            else
              git commit -m "🤖 sector_cache 업데이트 [auto]"
              git pull --rebase --autostash || true
              git push
            fi
          fi
